# PuppyBus FLASH config — Prusa Core One+ xBuddy + H503 extension.
# Minimal host config: the F427 MCU link + the PuppyBus driver, NO [mcu extension]
# (so cycling the H503's power can't shut klippy down) and NO kinematics.
# Used to flash/re-flash the H503 over RS-485, then it auto-chainloads.

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[puppybus]
de_pin: PB7              # RS485FlowControlPuppies (DE high = transmit)
baud: 230400             # PuppyBus normal-mode baud
pwr_pin: PG2             # ext_pwr_enable; starts OFF, PUPPY_PRECHARGE soft-starts it
reset_pin: PG8           # ext_reset (PG8 reset path is flaky; we power-cycle instead)
read_timeout_us: 20000
gap_us: 2000

[gcode_macro PUPPY_REFLASH]
description: Power-cycle the H503 into its bootloader and re-flash over RS-485; it auto-chainloads after
gcode:
    {% set f = params.FILE %}
    PUPPY_POWER ON=0                      # cut PG2 -> H503 off (power-cycle a running puppy; no FIRMWARE_RESTART needed)
    G4 P1500                              # let the 24 V rail drain so the H503 really resets (it powers down ~800 ms after PG2 cut)
    PUPPY_PRECHARGE MS=80                 # soft-start PG2 -> fresh H503 boot into the bootloader (3 s window)
    G4 P200                               # let the bootloader finish ClockInit/BusInit before we talk
    PUPPY_FLASH FILE={f}                  # handshake-catch within the window + stream the app over RS-485
    # macro ends -> bus goes idle -> bootloader auto-chainloads the re-flashed app (no PUPPY_START)
