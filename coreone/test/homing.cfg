[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: corexy
max_velocity: 350
max_accel: 2000
max_z_velocity: 30
max_z_accel: 200

[force_move]
enable_force_move: True

[stepper_x]
step_pin: PD7
dir_pin: !PD6
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2130_stepper_x:virtual_endstop
position_endstop: 252       # X homes toward +X (right); X_MAX_POS
position_min: -2
position_max: 252
homing_speed: 50
homing_retract_dist: 0      # REQUIRED for sensorless

[tmc2130 stepper_x]
cs_pin: PG15
spi_bus: spi3a
diag1_pin: PG9
run_current: 0.55
driver_SGT: 1              # VERIFIED: X trips+stops at right frame @0.55A              # firmware X_STALL_SENSITIVITY (tune live)
interpolate: True

[stepper_y]
step_pin: PD5
dir_pin: !PD4
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2130_stepper_y:virtual_endstop
position_endstop: -19       # Y homes toward -Y (front); Y_MIN_POS
position_min: -19
position_max: 221
homing_speed: 50
homing_retract_dist: 0

[tmc2130 stepper_y]
cs_pin: PB5
spi_bus: spi3a
diag1_pin: PE13
run_current: 0.45          # VERIFIED homing current for Y (0.55 too insensitive to trip)
driver_SGT: 0              # VERIFIED: Y trips+stops at front frame (X uses +1)
interpolate: True

[stepper_z]
step_pin: PD3
dir_pin: PD2
enable_pin: !PB8
microsteps: 16
rotation_distance: 8
endstop_pin: ^PG7
position_endstop: 0
position_min: 0
position_max: 270

[tmc2130 stepper_z]
cs_pin: PF15
spi_bus: spi3a
run_current: 0.6
interpolate: True

# === KEY FIX (Phase 2.6): DIAG must be push-pull, or it reads always-triggered ===
# The X/Y DIAG lines have a board pullup (R16) + the TMC2130 DIAG is open-drain by
# default -> Klipper reads it as permanently 'triggered' -> G28 completes instantly
# with no motion. Klipper has NO config option for diag1_pushpull, so set it at
# startup. WITHOUT this, sensorless homing does NOT work on the Core One.
[delayed_gcode set_diag_pushpull]
initial_duration: 1.0
gcode:
    SET_TMC_FIELD STEPPER=stepper_x FIELD=diag1_pushpull VALUE=1
    SET_TMC_FIELD STEPPER=stepper_y FIELD=diag1_pushpull VALUE=1

# === SGT tuning (live, supervised) ===
# Verified bracket on hardware @ 0.55A, homing_speed 50:
#   SGT -4/-2 -> trips instantly (too sensitive)
#   SGT +4    -> grinds into frame, no trigger (too insensitive)  <- user shut down
# So the sweet spot is ~0..+2. Tune live: SET_TMC_FIELD STEPPER=stepper_x FIELD=sgt VALUE=N
# then G28 X; goal = travels to the frame and stops cleanly. Repeat for Y.
# (Prusa's own value is -4..-6 but via SPI-polled StallGuard @70mm/s, not the DIAG pin.)
