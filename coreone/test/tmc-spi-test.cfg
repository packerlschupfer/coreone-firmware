# Phase 2.1 SAFE TMC2130 SPI comms test — no heaters/fans/extruder/probe.
# No motor enable or motion happens at klippy startup; this only reads/writes
# the TMC2130 config registers over (software) SPI to prove the SPI3 + CS wiring.
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 100
max_accel: 1000

[stepper_x]
step_pin: PD7
dir_pin: PD6
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG2
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2130 stepper_x]
cs_pin: PG15
spi_bus: spi3a
run_current: 0.5
stealthchop_threshold: 999999

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG3
position_endstop: 0
position_max: 220
homing_speed: 50

[tmc2130 stepper_y]
cs_pin: PB5
spi_bus: spi3a
run_current: 0.5
stealthchop_threshold: 999999

[stepper_z]
step_pin: PD3
dir_pin: PD2
enable_pin: !PB8
microsteps: 16
rotation_distance: 4
endstop_pin: ^PG4
position_endstop: 0
position_max: 270

[tmc2130 stepper_z]
cs_pin: PF15
spi_bus: spi3a
run_current: 0.5
