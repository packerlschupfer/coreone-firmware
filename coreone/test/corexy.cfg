# CoreXY motion-direction test — steppers + TMC2130 (SPI3a) + [force_move], no
# heaters/probe. No motion at startup; jog manually with FORCE_MOVE / G1 to verify
# X->right, Y->back and that a CoreXY 'X' move turns BOTH motors equally.
# Values here may be stale — boards/xbuddy.cfg is canonical. See test/README.md.
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: corexy
max_velocity: 100
max_accel: 1000

[stepper_x]
step_pin: PD7
dir_pin: PD6
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG2
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2130 stepper_x]
cs_pin: PG15
spi_bus: spi3a
run_current: 0.70
stealthchop_threshold: 999999

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG3
position_endstop: 0
position_max: 220
homing_speed: 50

[tmc2130 stepper_y]
cs_pin: PB5
spi_bus: spi3a
run_current: 0.70
stealthchop_threshold: 999999

[stepper_z]
step_pin: PD3
dir_pin: PD2
enable_pin: !PB8
microsteps: 16
rotation_distance: 4
endstop_pin: ^PG4
position_endstop: 0
position_max: 270

[tmc2130 stepper_z]
cs_pin: PF15
spi_bus: spi3a
run_current: 0.5

[extruder]
step_pin: PD1
dir_pin: PD0
enable_pin: !PD10
microsteps: 16
rotation_distance: 8
nozzle_diameter: 0.40
filament_diameter: 1.75
heater_pin: PB1
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA4
control: pid
pid_Kp: 22
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 350

[tmc2130 extruder]
cs_pin: PF12
spi_bus: spi3a
diag1_pin: PD14
run_current: 0.5

[force_move]
enable_force_move: True
