# PuppyBus first-contact test — Prusa Core One+ xBuddy + H503 extension.
# Minimal host config: just the MCU link + the PuppyBus driver. No kinematics
# (we only want to talk to the puppy bootloader), so nothing moves.
#
# After klippy connects, in the console:
#   PUPPY_PROTO_VERSION            # read bootloader protocol version @ addr 0x00
#   PUPPY_HWINFO                   # read hw_type / hw_rev / bl_ver / app_size
#   PUPPY_RAW ADDR=0 CMD=0         # raw frame for debugging (hex response)
# The puppy boots into its RS-485 bootloader at DEFAULT_ADDRESS=0x00 and answers
# GET_PROTOCOL_VERSION (cmd 0x00) with a 2-byte version (expect ~0x0302).

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[puppybus]
de_pin: PB7              # RS485FlowControlPuppies (DE high = transmit)
baud: 230400             # PuppyBus normal-mode baud (115200 in tester mode)
pwr_pin: PG2             # ext_pwr_enable (PUPPY_PRECHARGE drives it)
reset_pin: PG8           # ext_reset; module owns it (PUPPY_DISCOVER pulses it)
read_timeout_us: 20000   # how long to wait for the first reply byte (20 ms)
gap_us: 2000             # an inter-byte gap this long ends a reply (2 ms)
# Bring-up gcodes: PUPPY_PRECHARGE (power PG2), PUPPY_DISCOVER (atomic reset+probe
# of the bootloader), PUPPY_DEBUG / PUPPY_PININFO (USART6 self-test), PUPPY_RAW.
