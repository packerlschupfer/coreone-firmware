# Loadcell e-stall (clog) detector + HX717 channel-interleave bench harness.
#
# Exercises the F3 clog-detection stack end to end without the full machine:
#   - [estall_detect]            -> the FIR clog detector (klippy/extras/estall_detect.py)
#   - HX717 12:1 channel interleave (src/sensor_hx71x.c + hx71x.py enable_interleave)
#   - [hx71x_filament_sensor]    -> proves presence (ch B) stays live while the
#                                   loadcell/e-stall feed (ch A) runs during a print.
# Goal: confirm that arming e-stall turns interleave ON (ch A appears mid-"print"),
# that presence still updates, and that a hand-induced force edge trips the FIR.
#
# Values here may be stale — boards/xbuddy.cfg is canonical. See test/README.md.
# >>> The HX717 dout/sclk pins + calibration below are PLACEHOLDERS. Replace the
# >>> dout_pin/sclk_pin/reference_tare_counts with the real values from
# >>> ../boards/xbuddy.cfg before running, or the loadcell will read garbage. <<<

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f427xx_XXXXXXXXXXXX-if00
baud: 115200
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 100
max_accel: 1000

[force_move]
enable_force_move: True            # FORCE_MOVE STEPPER=extruder to jog E on the bench

[stepper_x]
step_pin: PD7
dir_pin: PD6
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG2
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2130 stepper_x]
cs_pin: PG15
spi_bus: spi3a
run_current: 0.5
stealthchop_threshold: 999999

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PB9
microsteps: 16
rotation_distance: 32
endstop_pin: ^PG3
position_endstop: 0
position_max: 220
homing_speed: 50

[tmc2130 stepper_y]
cs_pin: PB5
spi_bus: spi3a
run_current: 0.5
stealthchop_threshold: 999999

[stepper_z]
step_pin: PD3
dir_pin: PD2
enable_pin: !PB8
microsteps: 16
rotation_distance: 4
endstop_pin: ^PG4
position_endstop: 0
position_max: 270

[tmc2130 stepper_z]
cs_pin: PF15
spi_bus: spi3a
run_current: 0.5

[extruder]
step_pin: PD1
dir_pin: PD0
enable_pin: !PD10
microsteps: 16
rotation_distance: 8
nozzle_diameter: 0.40
filament_diameter: 1.75
heater_pin: PB1
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA4
control: pid
pid_Kp: 22
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 350

[tmc2130 extruder]
cs_pin: PF12
spi_bus: spi3a
diag1_pin: PD14
run_current: 0.5

# --- Loadcell Z-probe on the HX717 (channel A, gain 128) --------------------
# The e-stall detector binds to this probe's HX717 (probe.get_sensor()). On the
# real machine data_ready_irq is True (DOUT EXTI); left False here so placeholder
# pins don't trip the "EXTI line 5-9" requirement. counts_per_gram 52.083 is the
# documented Core One scale (matches Prusa -> the 700000 FIR threshold ports).
[load_cell_probe]
sensor_type: hx717
sclk_pin: PA2                      # PLACEHOLDER -> xbuddy.cfg HX717 SCLK
dout_pin: PA1                      # PLACEHOLDER -> xbuddy.cfg HX717 DOUT
data_ready_irq: False             # real config: True
z_offset: 0
speed: 3.0
counts_per_gram: 52.083
reference_tare_counts: 0          # PLACEHOLDER -> tare from xbuddy.cfg

# --- Filament-presence sensor on the SAME HX717 (channel B, gain 8) ---------
# Shares the chip with the loadcell; with e-stall armed the firmware interleaves
# so BOTH this (ch B) and the loadcell/e-stall feed (ch A) stay live in a print.
[hx71x_filament_sensor extruder]
pause_on_runout: False            # bench: don't pause, just report present/out

# --- The clog detector ------------------------------------------------------
# Bench settings: log-only (don't pause the bench) and disarmed at boot so you
# arm it manually. on_stall: pause + default_enabled: True is the print config.
[estall_detect]
#probe: probe
detection_threshold: 700000        # raw-count FIR trip (Prusa default; ports as-is)
invert: False                      # VERIFY edge sign on hardware (may need True)
on_stall: log                      # bench: log | pause | m600
min_extrude_speed: 0.5             # mm/s filament; gate shut below this
report_interval: 1.0
default_enabled: False             # bench: arm manually with ESTALL_DETECT ENABLE=1

# ----------------------------------------------------------------------------
# BENCH PROCEDURE
#   1. Flash this build, start klippy with this cfg. Confirm no errors.
#   2. FSENSOR_READ SENSOR=extruder         -> presence raw value (ch B alive).
#   3. ESTALL_DETECT ENABLE=1               -> arms detector + enables interleave.
#      Re-run FSENSOR_READ: presence must STILL update (ch B alive under interleave),
#      and `printer.estall_detect.filtered` (GET_STATUS / Mainsail) should move.
#   4. Allow cold extrude, then jog E forward to open the gate:
#         M302 P1
#         FORCE_MOVE STEPPER=extruder DISTANCE=20 VELOCITY=5    (or: G1 E20 F300)
#      While E advances, press on the loadcell / block the (cold) nozzle by hand to
#      create a force EDGE. Expect a log line: "estall: extruder clog/stall detected".
#   5. If it never trips with a clear edge -> flip `invert: True` (sign convention).
#      If it trips on a clean forward extrude with no clog -> raise detection_threshold.
#   6. Verify the GATE: jog E in REVERSE (retract) while pressing the cell -> must
#      NOT trip (gate shut on non-forward motion).
#   7. ESTALL_DETECT ENABLE=0               -> disarms + restores ch B presence only.
# ----------------------------------------------------------------------------
